# synth.is nginx configuration
# All traffic arrives via Cloudflare (SSL terminated there).
# Cloudflare -> port 80 -> NAT to 8080 on Mac Mini.
#
# IMPORTANT: Update the 'root' path in the synth.is server block below
# to match your SYNTH_ROOT on the production server.

# --- Upstreams ---

upstream render_float {
    # Round-robin across float rendering workers
    server 127.0.0.1:3001;
    server 127.0.0.1:3005;
    server 127.0.0.1:3006;
    server 127.0.0.1:3007;
}

# --- Frontend: synth.is ---

server {
    listen 8080;
    server_name synth.is www.synth.is;

    # UPDATE THIS PATH to match your production SYNTH_ROOT
    root /Users/bjornpjo/Developer/apps/synth.is/kromosynth-desktop/packages/web/dist;
    index index.html;

    # SPA fallback — serve index.html for all routes not matching a file
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Required for SharedArrayBuffer / WASM (sqlite-wasm)
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # Cache static assets aggressively (Vite uses content hashes in filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Re-add COOP/COEP since add_header in a location block
        # overrides parent block headers
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
    }

    # Correct MIME type for WebAssembly files
    location ~* \.wasm$ {
        types { application/wasm wasm; }
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
    }
}

# --- API: api.synth.is (kromosynth-recommend) ---

server {
    listen 8080;
    server_name api.synth.is recommend.synth.is;

    location / {
        proxy_pass http://127.0.0.1:3004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Some API endpoints may stream or be slow (spectrograms, genome data)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # CORS
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;

        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Type 'text/plain; charset=utf-8';
            add_header Content-Length 0;
            return 204;
        }
    }
}

